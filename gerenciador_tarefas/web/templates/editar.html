<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editar Tarefa - Nexus</title>
    
    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex flex-column vh-100" style="background-color: var(--bg-app);">

<div class="container py-5 d-flex justify-content-center align-items-center flex-grow-1">
    <div class="col-md-8 col-lg-6">
        <div class="task-card p-4 p-md-5 fade-in-up">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a href="/" class="action-btn text-muted p-2" style="border-radius: 50%;">
                    <i class="bi bi-arrow-left fs-5"></i>
                </a>
                <h4 class="font-poppins fw-bold m-0 flex-grow-1">Modificar Tarefa</h4>
            </div>

            <form method="post" class="d-flex flex-column gap-3">
                <div class="form-group">
                    <label class="form-label form-required">Título da Tarefa</label>
                    <input type="text" name="titulo" class="form-control form-control-lg fw-semibold" value="{{ tarefa.titulo }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label text-muted">Detalhes Adicionais</label>
                    <textarea name="descricao" class="form-control" rows="3">{{ tarefa.descricao }}</textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Prioridade</label>
                    <select name="prioridade" class="form-select w-100">
                        <option value="baixa" {% if tarefa.prioridade == 'baixa' %}selected{% endif %}>Bandeira Baixa</option>
                        <option value="média" {% if tarefa.prioridade == 'média' %}selected{% endif %}>Bandeira Média</option>
                        <option value="alta" {% if tarefa.prioridade == 'alta' %}selected{% endif %}>Bandeira Alta</option>
                    </select>
                </div>
                
                <div class="pt-4 border-top-subtle mt-1 d-flex gap-3">
                    <a href="/" class="btn bg-transparent text-muted flex-grow-1 px-3 fw-bold border" style="border-color: var(--border-subtle) !important;">Cancelar</a>
                    <button class="btn btn-primary flex-grow-1 d-flex align-items-center justify-content-center gap-2 fw-bold">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
