<!DOCTYPE html>
<html lang="pt-br" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - Nexus</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex justify-content-center align-items-center vh-100 m-0" style="background-color: var(--bg-app);">

<div class="task-card px-4 py-5" style="width: 100%; max-width: 400px; margin: 0 20px;">
    <div class="text-center mb-4">
        <div class="logo-box mx-auto mb-3" style="width: 48px; height: 48px;">
            <i class="bi bi-person-plus-fill logo-icon fs-3"></i>
        </div>
        <h3 class="font-poppins fw-bold mb-1">Criar Workspace</h3>
        <p class="text-muted small">Configure sua conta para usar o Nexus.</p>
    </div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} px-3 py-2 text-center" style="font-size: 0.85rem; border-radius: 8px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="post" class="d-grid gap-3 mt-2">
        <div class="form-group">
            <label class="form-label form-required">Nome de usuário</label>
            <input type="text" name="username" class="form-control" required placeholder="Escolha um nome único">
        </div>
        <div class="form-group">
            <label class="form-label form-required">Senha</label>
            <input type="password" name="password" class="form-control" required placeholder="Crie uma senha forte">
        </div>
        <button class="btn btn-primary d-flex align-items-center justify-content-center gap-2 py-2 mt-3 fw-bold">
            Registrar-me no Nexus
        </button>
    </form>
    
    <div class="text-center mt-4">
        <span class="text-muted small">Já tem uma conta? </span>
        <a href="/login" class="text-primary-accent text-decoration-none small fw-medium">Fazer Login</a>
    </div>
</div>

<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
